<script>
const NafanyaOrchestra = {
    pass: localStorage.getItem('master_key') || "",
    api_endpoint: '/api/execute',

    async send(cmdText) {
        if (!this.pass) { this.askPassword(); return; }
        try {
            const response = await fetch(this.api_endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmdText, password: this.pass })
            });
            if (response.status === 403) {
                alert("ОШИБКА ДОСТУПА: Пароль сброшен.");
                this.pass = ""; localStorage.removeItem('master_key');
                return;
            }
            const res = await response.json();
            this.updateUI(res.data);
        } catch (e) {
            this.logToUI("SYSTEM", "Ошибка связи с сервером. Проверьте билд на Vercel.");
        }
    },

    updateUI(data) {
        const logBox = document.querySelector('.op-msgs');
        if (logBox) {
            logBox.innerHTML = data.logs.map(l => `
                <div class="msg-branch" style="border-left: 2px solid #b6ff4e; margin-bottom: 8px; padding-left: 10px;">
                    <small style="color:#888;">${l.time}</small>
                    <div style="color:#eee; font-size:13px;">${l.msg}</div>
                </div>
            `).join('');
            logBox.scrollTop = logBox.scrollHeight;
        }
        const profit = document.querySelector('.opp-val');
        if (profit) profit.innerText = data.profit.toLocaleString() + " ₴";
    },

    askPassword() {
        const p = prompt("NAFANYA v5.4 ACCESS KEY:");
        if (p) { this.pass = p; localStorage.setItem('master_key', p); this.send("INITIALIZE_OS"); }
    },

    logToUI(s, m) {
        document.querySelector('.op-msgs').insertAdjacentHTML('beforeend', `<div>[${s}] ${m}</div>`);
    }
};

document.addEventListener('DOMContentLoaded', () => {
    const btn = document.querySelector('.send-btn');
    const area = document.querySelector('.op-textarea');
    if (btn && area) {
        btn.onclick = () => { if(area.value.trim()){ NafanyaOrchestra.send(area.value); area.value=""; } };
        area.onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); btn.click(); } };
    }
});
</script>
